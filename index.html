<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThinkQuest</title>
<style>
  :root {
    --bg:#0f0f1a; --card:#1a1a2e; --card2:#16213e;
    --p:#7c3aed; --p2:#a78bfa; --cyan:#06b6d4;
    --amber:#f59e0b; --green:#10b981; --red:#ef4444;
    --text:#f0f0ff; --muted:#8888aa; --border:#2a2a4a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
  button{font-family:inherit}
  #app{min-height:100vh}

.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* Hero */
.hero-logo{font-size:56px;text-align:center;margin-bottom:8px}
.hero-title{font-size:28px;font-weight:900;text-align:center;background:linear-gradient(90deg,#a78bfa,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hero-sub{color:#666;font-size:14px;text-align:center;margin-bottom:36px}

/* Cards */
.card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:16px 18px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left;width:100%;transition:transform .15s}
.card:active{transform:scale(.97)}
.card-icon{font-size:28px;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card h3{font-size:15px;font-weight:800;color:#fff;margin-bottom:3px}
.card p{font-size:12px;color:#888}
.card .arrow{font-size:20px;margin-left:auto;flex-shrink:0}

/* Difficulty pills */
.diff-row{display:flex;flex-direction:column;gap:14px;padding:0 0 30px}
.diff-btn{border-radius:20px;padding:20px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);width:100%;transition:transform .15s}
.diff-btn:active{transform:scale(.97)}
.diff-emoji{font-size:36px;width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.diff-btn h3{font-size:18px;font-weight:800;color:#fff;margin-bottom:3px}
.diff-btn p{font-size:13px;color:#aaa}

/* Play */
.play-header{display:flex;align-items:center;gap:10;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.back-btn{background:rgba(255,255,255,.1);border:none;border-radius:11px;color:white;width:36px;height:36px;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.dots{display:flex;gap:5px;justify-content:center}
.dot{height:8px;border-radius:4px;transition:all .3s}

.puzzle-wrap{flex:1;overflow-y:auto;padding:16px 14px 28px}
.level-badge{display:inline-block;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;margin-bottom:14px}
.question{font-size:16px;font-weight:700;line-height:1.6;margin-bottom:18px;white-space:pre-line;color:#fff}

/* Options */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{border-radius:16px;padding:18px 10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;line-height:1.3;white-space:pre-line;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08)}
.opt-btn.correct{background:rgba(16,185,129,.3)!important;border:2px solid #10b981!important}
.opt-btn.wrong{background:rgba(239,68,68,.25)!important;border:2px solid #ef4444!important}

.elim-wrap{display:flex;flex-wrap:wrap;gap:9px}
.elim-btn{border-radius:13px;padding:14px 16px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);flex:1 1 auto;min-width:72px}
.elim-btn.correct{background:rgba(16,185,129,.3)!important;border:2px solid #10b981!important}
.elim-btn.wrong{background:rgba(239,68,68,.25)!important;border:2px solid #ef4444!important}

/* Feedback */
.feedback-box{border-radius:17px;padding:18px;margin-bottom:14px}
.feedback-box.ok{background:rgba(16,185,129,.15);border:1.5px solid #10b981}
.feedback-box.bad{background:rgba(239,68,68,.12);border:1.5px solid #ef4444}
.feedback-icon{font-size:26px;margin-bottom:6px}
.feedback-title{font-weight:800;font-size:17px;margin-bottom:8px;color:#fff}
.feedback-text{font-size:14px;color:#fff;line-height:1.6}
.hint-btn{margin-top:14px;background:none;border:1px dashed rgba(255,255,255,.2);border-radius:12px;color:#999;padding:9px 14px;font-size:12px;cursor:pointer;width:100%}
.hint-box{margin-top:12px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:13px;padding:11px 14px;font-size:13px;color:#fcd34d;line-height:1.5}

/* Action btns */
.btn-primary{width:100%;padding:14px;border-radius:16px;color:#fff;font-weight:800;font-size:15px;border:none;cursor:pointer;margin-bottom:10px}
.btn-secondary{width:100%;padding:14px;border-radius:16px;color:white;font-weight:800;font-size:15px;cursor:pointer;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}

/* Result */
.result-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;flex:1}
.result-trophy{font-size:58px;margin-bottom:10px}
.result-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px}
.result-sub{color:#ccc;font-size:14px;margin-bottom:24px}
.result-card{background:rgba(255,255,255,.07);border-radius:20px;padding:22px;margin-bottom:20px;width:100%;max-width:300px}
.stars-row{display:flex;justify-content:center;gap:4px;margin-bottom:10px}
.xp-gained{font-size:28px;font-weight:900}

/* XP bar */
.xp-track{background:rgba(255,255,255,.12);border-radius:8px;height:7px;overflow:hidden;width:100%}
.xp-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#7c3aed,#06b6d4);transition:width .6s ease}

/* Nav header */
.nav-header{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-title{font-weight:800;font-size:16px;color:#fff;flex:1}

/* Responsive padding */
.page-pad{padding:16px 14px 30px}

@keyframes pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.pulse-dot{width:10px;height:10px;border-radius:50%;display:inline-block;animation:pulse 1.2s ease-in-out infinite}
</style>

</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const WORLDS = [
  {id:"patterns",name:"Cipher Caves",    emoji:"🔍",color:"#7c3aed",light:"#a78bfa",bg:"#1a0f3a",desc:"Spot the rule, crack the code"},
  {id:"logic",   name:"Detective HQ",   emoji:"🔎",color:"#0891b2",light:"#67e8f9",bg:"#0a1f2e",desc:"Use clues to find the truth"},
  {id:"combos",  name:"Alchemist's Lab",emoji:"🧪",color:"#059669",light:"#6ee7b7",bg:"#0a2018",desc:"Count every possibility"},
  {id:"strategy",name:"Strategy Citadel",emoji:"♟️",color:"#b45309",light:"#fcd34d",bg:"#1f1500",desc:"Think ahead, outsmart opponents"},
];

const DIFFICULTIES = [
  {id:"easy",  label:"Easy",  emoji:"🌱",desc:"Simple, 1-step problems",  color:"#10b981", xp:5},
  {id:"medium",label:"Medium",emoji:"🌿",desc:"2–3 steps, some tricky bits",color:"#f59e0b", xp:10},
  {id:"hard",  label:"Hard",  emoji:"🔥",desc:"Multi-step, real brain work",color:"#ef4444", xp:15},
];

const BANK = {
  patterns:{
    easy:[
      {type:"tap",q:"What comes next?\n🔴 🔵 🔴 🔵 🔴 ___",options:["🔴","🔵","🟡","🟢"],answer:1,hint:"Look at every 2nd position.",explain:"Unit is RED→BLUE repeating. Position 6 = 🔵."},
      {type:"tap",q:"Which number comes next?\n2, 4, 6, 8, ___",options:["9","10","11","12"],answer:1,hint:"What is the gap between each number?",explain:"Add 2 each time. 8 + 2 = 10."},
      {type:"elim",q:"Tap the shape that comes next:\n▲ ■ ▲ ■ ▲ ___",items:["▲","■","●","★"],answer:1,hint:"What appears at every 2nd position?",explain:"Pattern unit is (▲ ■). Position 6 = ■."},
      {type:"tap",q:"Which number is missing?\n1, 2, 3, ___, 5, 6",options:["2","4","5","7"],answer:1,hint:"Count up from 1.",explain:"The sequence counts up by 1. After 3 comes 4."},
      {type:"elim",q:"Which colour comes next?\n🟥 🟦 🟥 🟦 ___",items:["🟥","🟦","🟨","🟩"],answer:0,hint:"The pattern alternates between two colours.",explain:"Red and Blue alternate. After 🟦 comes 🟥."},
      {type:"tap",q:"5, 10, 15, 20, ___",options:["22","24","25","30"],answer:2,hint:"What do you add each time?",explain:"Add 5 each time. 20 + 5 = 25."},
      {type:"tap",q:"A B A B A ___",options:["A","B","C","D"],answer:1,hint:"The pattern repeats in pairs.",explain:"A and B alternate. After A comes B."},
      {type:"elim",q:"Which is the ODD ONE OUT?\nDog  Cat  Rose  Fish",items:["Dog","Cat","Rose","Fish"],answer:2,hint:"Three are animals. One is not.",explain:"Rose is a plant. Dog, Cat, and Fish are all animals."},
      {type:"tap",q:"10, 20, 30, ___",options:["35","38","40","45"],answer:2,hint:"You add the same number each time.",explain:"Add 10 each time. 30 + 10 = 40."},
      {type:"elim",q:"Which number comes next?\n3, 6, 9, 12, ___",items:["13","14","15","16"],answer:2,hint:"What is the gap between numbers?",explain:"Add 3 each time. 12 + 3 = 15."},
      {type:"tap",q:"🌙 ⭐ 🌙 ⭐ 🌙 ___",options:["🌙","⭐","☀️","🌍"],answer:1,hint:"Two symbols alternate.",explain:"Moon and Star alternate. After 🌙 comes ⭐."},
      {type:"elim",q:"Odd one out:\nApple  Banana  Carrot  Orange",items:["Apple","Banana","Carrot","Orange"],answer:2,hint:"Three are fruits. One is a vegetable.",explain:"Carrot is a vegetable. The others are fruits."},
    ],
    medium:[
      {type:"tap",q:"Two rules change at once.\nSmall🔴 Big🔴 Small🔵 Big🔵 Small🔴 ___",options:["Small🔵","Big🔴","Big🔵","Small🔴"],answer:1,hint:"Track SIZE and COLOUR separately.",explain:"Size: S,B,S,B,S→B. Colour: R,R,B,B,R→R. Answer: Big🔴."},
      {type:"tap",q:"Find the next number:\n3, 6, 5, 10, 9, ___",options:["10","18","8","12"],answer:1,hint:"Look at pairs — does the rule alternate?",explain:"Alternates ×2 then −1. After 9: 9×2=18."},
      {type:"elim",q:"Which tile is MISSING?\nRow1: 🔴🔵🟡\nRow2: 🔵🟡🔴\nRow3: 🟡 ___ 🔵",items:["🔴","🔵","🟡","🟢"],answer:0,hint:"Each row uses all 3 colours once.",explain:"Row 3 has 🟡 and 🔵. The missing colour is 🔴."},
      {type:"tap",q:"What is the rule?\n2→6, 3→9, 5→15, 4→___",options:["10","12","14","16"],answer:1,hint:"What do you do to the input number?",explain:"Rule is ×3. So 4×3=12."},
      {type:"tap",q:"1, 4, 9, 16, ___",options:["20","25","24","18"],answer:1,hint:"These are special numbers. Try squaring 1,2,3,4...",explain:"Square numbers: 1²,2²,3²,4²,5²=25."},
      {type:"elim",q:"Which breaks the pattern?\n2  4  6  9  10  12",items:["4","6","9","10"],answer:2,hint:"All numbers should be even.",explain:"9 is odd. All others (2,4,6,10,12) are even numbers."},
      {type:"tap",q:"A=1, B=2, C=3...\nWhat letter is number 5?",options:["D","E","F","G"],answer:1,hint:"Count along the alphabet.",explain:"A=1,B=2,C=3,D=4,E=5. The answer is E."},
      {type:"tap",q:"100, 90, 80, 70, ___",options:["65","60","55","50"],answer:1,hint:"What is being subtracted each time?",explain:"Subtract 10 each time. 70−10=60."},
      {type:"elim",q:"Odd one out:\n4  8  12  15  20",items:["8","12","15","20"],answer:2,hint:"All should be multiples of 4.",explain:"15 is not a multiple of 4. All others (4,8,12,20) are."},
      {type:"tap",q:"Find the rule:\n5→8, 10→13, 3→6, 7→___",options:["9","10","11","12"],answer:1,hint:"What is being added to each input?",explain:"Rule is +3. So 7+3=10."},
      {type:"tap",q:"What comes next?\n1, 1, 2, 3, 5, 8, ___",options:["11","12","13","14"],answer:2,hint:"Add the two previous numbers together.",explain:"Each number = sum of previous two. 5+8=13."},
      {type:"elim",q:"Which number fits the rule?\nRule: always between 10 and 20",items:["9","15","21","7"],answer:1,hint:"Which number is greater than 10 AND less than 20?",explain:"15 is between 10 and 20. The others are outside this range."},
    ],
    hard:[
      {type:"tap",q:"Sequence has TWO alternating rules.\n1, 2, 6, 7, 21, 22, ___",options:["23","66","44","42"],answer:1,hint:"Split into two interleaved sub-sequences.",explain:"Even steps: +1. Odd steps: ×3. After 22: 22×3=66."},
      {type:"elim",q:"Which has a DIFFERENT rule from the others?",items:["1,4,9,16","4,9,16,25","2,4,8,16","1,9,25,49"],answer:2,hint:"Three are related to square numbers. One is not.",explain:"2,4,8,16 = powers of 2. The others are all square number sequences."},
      {type:"tap",q:"INPUT → ×2 → −3 → ×2 → OUTPUT\nInput = 5. Output = ?",options:["11","14","10","7"],answer:1,hint:"Apply each operation one step at a time.",explain:"5×2=10, 10−3=7, 7×2=14."},
      {type:"tap",q:"Grid:\nRow1: 1, 2, 3\nRow2: 2, 4, 6\nRow3: 3, 6, ___",options:["7","8","9","10"],answer:2,hint:"Look at both the row rule AND the column rule.",explain:"Row rule: ×row number. Column rule: ×column number. Row3,Col3 = 3×3=9."},
      {type:"tap",q:"A function: f(x) = x×x − 1\nf(4) = ?",options:["13","14","15","16"],answer:2,hint:"First square 4, then subtract 1.",explain:"4×4=16, 16−1=15."},
      {type:"elim",q:"Which sequence is NOT arithmetic\n(does not add the same number each time)?",items:["2,4,6,8","3,6,9,12","1,2,4,8","5,10,15,20"],answer:2,hint:"An arithmetic sequence has a constant gap.",explain:"1,2,4,8 doubles each time (×2), not a constant add. The others add 2, 3, and 5 respectively."},
      {type:"tap",q:"Pattern: each row's sum = 10.\nRow1: 1,2,3,4\nRow2: 5,3,2,?\nRow3: 7,?,1,1",options:["Row2 missing=0, Row3 missing=1","Row2=0, Row3=2","Row2=1, Row3=2","Row2=2, Row3=0"],answer:0,hint:"Add up what you have in each row, then find what's missing to make 10.",explain:"Row2: 5+3+2=10, ?=0. Row3: 7+1+1=9, ?=1."},
      {type:"tap",q:"Rule: output = (input + 3) × 2\nWhich input gives output 16?",options:["4","5","6","7"],answer:1,hint:"Work backwards: 16÷2=8, then 8−3=5.",explain:"Reverse the rule: 16÷2=8, 8−3=5. Input=5."},
    ],
  },
  logic:{
    easy:[
      {type:"elim",q:"Alice, Ben, Cara each have one pet.\n① Ben ≠ cat\n② Cara = fish\nWho has the CAT?",items:["Alice","Ben","Cara"],answer:0,hint:"Start with what's certain: who has the fish?",explain:"Cara=fish. Ben≠cat so Ben=dog. Alice gets the cat."},
      {type:"tap",q:"Tom is taller than Sam.\nSam is taller than Jay.\nIs Tom taller than Jay?",options:["Yes","No","Can't tell","Sometimes"],answer:0,hint:"Can you chain the two facts together?",explain:"Tom>Sam AND Sam>Jay means Tom>Sam>Jay. Yes, Tom is taller."},
      {type:"tap",q:"All dogs are animals.\nRex is a dog.\nIs Rex an animal?",options:["Yes","No","Maybe","Sometimes"],answer:0,hint:"The rule applies to ALL dogs.",explain:"All dogs are animals. Rex is a dog. So Rex is an animal."},
      {type:"tap",q:"If it is raining, Sara brings an umbrella.\nSara has her umbrella today.\nIs it definitely raining?",options:["Yes","No","Maybe","Always"],answer:2,hint:"Could Sara have brought her umbrella for another reason?",explain:"She might bring it just in case. Rain → umbrella, but umbrella doesn't prove rain."},
      {type:"elim",q:"Three friends each have a different colour pencil.\nRed, Blue, Green.\n① Mia ≠ Red\n② Sam = Blue\nWho has Red?",items:["Mia","Sam","Leo"],answer:2,hint:"Sam's colour is given directly. Then eliminate.",explain:"Sam=Blue. Mia≠Red, so Mia=Green. Leo must have Red."},
      {type:"tap",q:"All squares are rectangles.\nShape X is a square.\nIs Shape X a rectangle?",options:["Yes","No","Maybe","Can't tell"],answer:0,hint:"If all squares are rectangles, what does that mean for Shape X?",explain:"All squares ARE rectangles. Shape X is a square. So Shape X is a rectangle."},
      {type:"tap",q:"Anna is older than Ben.\nBen is older than Cara.\nWho is the youngest?",options:["Anna","Ben","Cara","Can't tell"],answer:2,hint:"Chain the two age facts together.",explain:"Anna>Ben>Cara. Cara is the youngest."},
      {type:"elim",q:"There are 3 boxes: A, B, C.\nThe ball is NOT in A.\nThe ball is NOT in B.\nWhere is the ball?",items:["Box A","Box B","Box C"],answer:2,hint:"Eliminate the impossible options.",explain:"Not A, not B — it must be in C."},
      {type:"tap",q:"Every cat has whiskers.\nFluffy has whiskers.\nIs Fluffy definitely a cat?",options:["Yes","No","Maybe","Always"],answer:2,hint:"Other animals also have whiskers.",explain:"Cats have whiskers, but so do other animals like rabbits. Fluffy might not be a cat."},
      {type:"tap",q:"P is TRUE. Q is FALSE.\nWhat is P AND Q?",options:["True","False","Maybe","Depends"],answer:1,hint:"AND requires BOTH to be true.",explain:"AND is only true when both are true. P=true, Q=false → FALSE."},
      {type:"elim",q:"4 children: Red, Blue, Yellow, Green shirts.\nAl=Red. Beth≠Blue. Cal=Yellow.\nWhat colour is Beth's shirt?",items:["Red","Blue","Green","Yellow"],answer:2,hint:"Eliminate colours already taken or ruled out.",explain:"Red=Al, Yellow=Cal, Beth≠Blue. So Beth=Green."},
      {type:"tap",q:"No fish can walk.\nGoldie is a fish.\nCan Goldie walk?",options:["Yes","No","Maybe","Sometimes"],answer:1,hint:"Apply the rule directly.",explain:"No fish can walk. Goldie is a fish. So Goldie cannot walk."},
    ],
    medium:[
      {type:"tap",q:"If A→B and B→C,\nwhich MUST be true?",options:["A→C only","C→A only","Both","Neither"],answer:0,hint:"Arrows chain forward but don't reverse.",explain:"A→B and B→C means A→C by chaining. But C→A is not guaranteed."},
      {type:"elim",q:"Three boxes. One has gold.\nA: 'Gold is in B'\nB: 'Gold is not here'\nC: 'Gold is in A'\nExactly ONE label is true. Where?",items:["Box A","Box B","Box C"],answer:1,hint:"Try placing gold in each box and count true statements.",explain:"Gold in B: A=true, B=false, C=false → exactly 1 true ✓"},
      {type:"tap",q:"Anna, Bo, Cal, Dana like colours.\n① Anna≠red ② Bo=blue\n③ Cal≠green ④ Dana≠yellow\nWho CAN have red?",options:["Anna","Bo","Cal","Dana"],answer:2,hint:"Eliminate who definitely can't have red.",explain:"Bo=blue. Anna≠red. Cal has no restriction on red. Cal can have red."},
      {type:"tap",q:"All mammals are warm-blooded.\nWhales are mammals.\nAre whales warm-blooded?",options:["Yes","No","Maybe","Can't tell"],answer:0,hint:"Apply the rule: if ALL mammals, then whales too.",explain:"All mammals are warm-blooded. Whales are mammals. So whales are warm-blooded."},
      {type:"elim",q:"4 suspects. One lied. Statements:\nA:'I was home.' B:'A is lying.'\nC:'B is honest.' D:'C is lying.'\nIf only A lied, which statements are TRUE?",items:["B and C only","B, C and D","A and D","C and D only"],answer:0,hint:"If A lied, B's statement is true. Then follow the chain.",explain:"A lies → B is telling truth (true). B is honest → C is correct (true). D says C is lying = false. So B and C are true."},
      {type:"tap",q:"Some birds can't fly (penguins, ostriches).\nTweety is a bird.\nCan Tweety definitely fly?",options:["Yes","No","Maybe","Always"],answer:2,hint:"'Some' birds can't fly — we don't know which kind Tweety is.",explain:"Since some birds can't fly, we can't be certain. Tweety might or might not be able to fly."},
      {type:"tap",q:"If not A → B.\nWe know B is false.\nWhat can we say about A?",options:["A is false","A is true","Can't tell","A is maybe true"],answer:1,hint:"Work backwards: if B is false, what must be true for the rule to hold?",explain:"Not A → B. B is false. So 'not A' must be false. Therefore A is true."},
      {type:"elim",q:"5 people sit in a row.\nAli is at one end. Ben is next to Ali.\nCara is NOT next to Ben.\nWho can sit in position 3 (middle)?",items:["Ali","Ben","Cara","Any of them"],answer:2,hint:"Place Ali and Ben first. Position 3 must not be next to Ben.",explain:"Ali=1, Ben=2 (next to Ali). Position 3 is next to Ben so Cara can't be there. Cara must be position 4 or 5. Actually Ben could also be position 1 and Ali=2. The key is Cara avoids being adjacent to Ben."},
    ],
    hard:[
      {type:"tap",q:"Knights tell truth. Knaves lie.\nA says: 'B is a knight.'\nB says: 'A and I are different types.'\nWhat are they?",options:["Both knights","Both knaves","A=knight, B=knave","A=knave, B=knight"],answer:1,hint:"Assume A is a knight and follow all consequences.",explain:"If A is a knight: B is a knight (A said so). But B says 'we're different' which is false. Contradiction. So A is a knave, and B is also a knave."},
      {type:"tap",q:"100 lockers, all closed.\nStudent n toggles every nth locker.\nWhich locker is open after all 100 students?",options:["Locker 50","Locker 25","Locker 36","Locker 64"],answer:2,hint:"A locker stays open if toggled an odd number of times. Perfect squares have an odd number of factors.",explain:"Only perfect squares have an odd number of factors. 36=6² is a perfect square and stays open."},
      {type:"elim",q:"4 suspects. Exactly one did it.\nA:'It was B.' B:'It was C.'\nC:'Not me.' D:'A is lying.'\nOnly ONE statement is true. Who did it?",items:["A","B","C","D"],answer:3,hint:"Try each suspect. Count how many statements become true each time.",explain:"If D did it: A=false, B=false, C=true, D=false → exactly 1 true ✓"},
      {type:"tap",q:"P=true, Q=false, R=true.\nWhat is (P OR Q) AND (NOT R)?",options:["True","False","Maybe","Depends"],answer:1,hint:"Solve the brackets first, then combine.",explain:"(P OR Q)=true OR false=true. (NOT R)=NOT true=false. true AND false=FALSE."},
      {type:"tap",q:"If A then B. If B then C. If C then D.\nD is false. What can we conclude?",options:["A is false","B is false","C is false","All of the above"],answer:3,hint:"Work backwards from D being false.",explain:"D=false → C=false (contrapositive). C=false → B=false. B=false → A=false. All are false."},

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = {
  screen: "home",       // home | difficulty | play | result
  worldId: null,
  difficulty: null,
  puzzles: [],
  idx: 0,
  phase: "play",        // play | feedback
  lastOk: null,
  answers: [],
  score: 0,
  hintShown: false,
  totalXP: 0,
  playerName: "",
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ═══════════════════════════════════════════════
// PUZZLE PICKER (random from bank)
// ═══════════════════════════════════════════════
function pickPuzzles(worldId, difficulty) {
  const pool = BANK[worldId][difficulty];
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 3);
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  const s = state;
  const world = WORLDS.find(w => w.id === s.worldId);
  const diff = DIFFICULTIES.find(d => d.id === s.difficulty);

  if (s.screen === "home")       { app.innerHTML = renderHome(); }
  else if (s.screen === "difficulty") { app.innerHTML = renderDifficulty(world); }
  else if (s.screen === "play")  { app.innerHTML = renderPlay(world, diff); }
  else if (s.screen === "result"){ app.innerHTML = renderResult(world, diff); }

  bindEvents();
}

// ─── HOME ─────────────────────────────────────
function renderHome() {
  const xp = state.totalXP;
  const cards = WORLDS.map(w => `
    <button class="card" data-action="selectWorld" data-id="${w.id}" style="background:${w.bg};border-color:${w.color}55">
      <div class="card-icon" style="background:${w.color}33;border:1.5px solid ${w.color}66">${w.emoji}</div>
      <div style="flex:1">
        <h3>${w.name}</h3>
        <p>${w.desc}</p>
        <div style="display:flex;gap:6px;margin-top:6px">
          ${DIFFICULTIES.map(d=>`<span style="font-size:11px;color:${d.color};font-weight:600">${d.emoji}${d.label}</span>`).join("")}
        </div>
      </div>
      <span class="arrow" style="color:${w.light}">›</span>
    </button>
  `).join("");

  return `
    <div class="screen active" style="background:linear-gradient(180deg,#0d0d1f,#0a0a18);padding:0">
      <div style="padding:24px 16px 0">
        <div class="hero-logo">🧠</div>
        <div class="hero-title">ThinkQuest</div>
        <div class="hero-sub">Train your brain. Level up your thinking.</div>
        <div style="background:rgba(255,255,255,.07);border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <span style="font-size:13px;color:#aaa">Total XP earned</span>
          <span style="font-size:20px;font-weight:900;color:#fcd34d">${xp} XP</span>
        </div>
        <div style="font-size:11px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px">Choose a World</div>
        ${cards}
        <div style="text-align:center;font-size:12px;color:#444;padding:16px 0 30px">New questions every session ✨</div>
      </div>
    </div>`;
}

// ─── DIFFICULTY ───────────────────────────────
function renderDifficulty(world) {
  const w = world;
  const btns = DIFFICULTIES.map(d => `
    <button class="diff-btn" data-action="selectDiff" data-id="${d.id}" style="border-color:${d.color}44">
      <div class="diff-emoji" style="background:${d.color}22;border:1.5px solid ${d.color}55">${d.emoji}</div>
      <div style="flex:1;text-align:left">
        <h3 style="color:#fff">${d.label}</h3>
        <p>${d.desc}</p>
      </div>
      <span style="font-size:22px;color:${d.color}">›</span>
    </button>
  `).join("");

  return `
    <div class="screen active" style="background:${w.bg}">
      <div class="nav-header">
        <button class="back-btn" data-action="goHome">←</button>
        <span style="font-size:20px">${w.emoji}</span>
        <span class="nav-title">${w.name}</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 18px">
        <div style="font-size:14px;color:#aaa;text-align:center;margin-bottom:24px">Choose your difficulty</div>
        <div class="diff-row">${btns}</div>
        <div style="text-align:center;font-size:12px;color:#555">Questions change every time ✨</div>
      </div>
    </div>`;
}

// ─── PLAY ─────────────────────────────────────
function renderPlay(world, diff) {
  const w = world, d = diff, s = state;
  const puzzle = s.puzzles[s.idx];
  const total = s.puzzles.length;

  const dots = s.puzzles.map((_, i) => {
    const w2 = i < s.answers.length ? (s.answers[i] ? "8px" : "8px") : (i === s.idx ? "18px" : "8px");
    const bg = i < s.answers.length ? (s.answers[i] ? "#10b981" : "#ef4444") : (i === s.idx ? w.light : "rgba(255,255,255,.2)");
    return `<div class="dot" style="width:${w2};background:${bg}"></div>`;
  }).join("");

  let puzzleHTML = "";
  if (s.phase === "play") {
    if (puzzle.type === "tap") {
      const opts = (puzzle.options||[]).map((opt,i) => `
        <button class="opt-btn" data-action="tapAnswer" data-idx="${i}">${opt}</button>
      `).join("");
      puzzleHTML = `<div class="options-grid">${opts}</div>`;
    } else {
      const items = (puzzle.items||[]).map((item,i) => `
        <button class="elim-btn" data-action="elimAnswer" data-idx="${i}">${item}</button>
      `).join("");
      puzzleHTML = `
        <p style="color:#aaa;font-size:12px;margin-bottom:10px">Tap your answer</p>
        <div class="elim-wrap">${items}</div>`;
    }
    const hintHTML = s.hintShown
      ? `<div class="hint-box">💡 ${puzzle.hint}</div>`
      : `<button class="hint-btn" data-action="showHint">💡 Show hint</button>`;
    puzzleHTML += hintHTML;
  } else {
    const ok = s.lastOk;
    puzzleHTML = `
      <div class="feedback-box ${ok?'ok':'bad'}">
        <div class="feedback-icon">${ok?"✅":"❌"}</div>
        <div class="feedback-title">${ok?"Correct!":"Not quite…"}</div>
        <div class="feedback-text">${puzzle.explain}</div>
      </div>
      ${ok
        ? `<button class="btn-primary" data-action="nextPuzzle" style="background:linear-gradient(135deg,${w.color},${w.light})">${s.idx < total-1 ? "Next Puzzle →" : "See Results 🎯"}</button>`
        : `<button class="btn-secondary" data-action="retryPuzzle">Try Again 🔄</button>`
      }`;
  }

  return `
    <div class="screen active" style="background:${w.bg}">
      <div class="nav-header">
        <button class="back-btn" data-action="goHome">←</button>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:#ccc">${w.emoji} ${w.name}</div>
          <div style="font-size:11px;font-weight:600;color:${d.color}">${d.emoji} ${d.label}</div>
        </div>
        <div class="dots">${dots}</div>
      </div>
      <div class="puzzle-wrap">
        <div class="level-badge" style="background:${d.color}22;border:1px solid ${d.color}66;color:${d.color}">
          Puzzle ${s.idx+1} of ${total}
        </div>
        <div class="question">${puzzle.q}</div>
        ${puzzleHTML}
      </div>
    </div>`;
}

// ─── RESULT ───────────────────────────────────
function renderResult(world, diff) {
  const w = world, d = diff, s = state;
  const pct = Math.round((s.score / s.puzzles.length) * 100);
  const msg = pct===100 ? "Perfect! 🏆" : pct>=66 ? "Well done! 🎉" : pct>=33 ? "Good effort! 💪" : "Keep practising! 🔄";
  const xpGained = s.score * d.xp;
  const stars = s.puzzles.map((_, i) =>
    `<span style="font-size:28px;filter:${i<s.score?"none":"grayscale(1) opacity(.25)"}">⭐</span>`
  ).join("");

  return `
    <div class="screen active" style="background:${w.bg}">
      <div class="result-wrap">
        <div class="result-trophy">${pct===100?"🏆":pct>=66?"🎉":"💪"}</div>
        <div class="result-title">${msg}</div>
        <div class="result-sub">${s.score}/${s.puzzles.length} correct · ${d.emoji} ${d.label}</div>
        <div class="result-card">
          <div class="stars-row">${stars}</div>
          <div class="xp-gained" style="color:${w.light}">+${xpGained} XP</div>
          <div style="font-size:12px;color:#888;margin-top:4px">Total: ${s.totalXP + xpGained} XP</div>
        </div>
        <button class="btn-primary" data-action="playAgain" style="background:linear-gradient(135deg,${w.color},${w.light});max-width:300px">
          🔄 New Questions
        </button>
        <button class="btn-secondary" data-action="goHome" style="max-width:300px">Back to Map</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
function bindEvents() {
  document.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", handleAction);
  });
}

function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;
  const idx = parseInt(e.currentTarget.dataset.idx);
  const s = state;

  if (action === "goHome") {
    setState({ screen:"home", worldId:null, difficulty:null, puzzles:[], idx:0, phase:"play", answers:[], score:0, hintShown:false, lastOk:null });
  }
  else if (action === "selectWorld") {
    setState({ screen:"difficulty", worldId:id });
  }
  else if (action === "selectDiff") {
    const puzzles = pickPuzzles(s.worldId, id);
    setState({ screen:"play", difficulty:id, puzzles, idx:0, phase:"play", answers:[], score:0, hintShown:false, lastOk:null });
  }
  else if (action === "tapAnswer" || action === "elimAnswer") {
    if (s.phase !== "play") return;
    const puzzle = s.puzzles[s.idx];
    const correct = idx === puzzle.answer;
    // Highlight answer visually
    const btns = document.querySelectorAll("[data-action='tapAnswer'], [data-action='elimAnswer']");
    btns.forEach((btn, i) => {
      if (i === puzzle.answer) btn.classList.add("correct");
      else if (i === idx && !correct) btn.classList.add("wrong");
      btn.style.cursor = "default";
    });
    setTimeout(() => {
      const newScore = correct ? s.score + 1 : s.score;
      const newAnswers = [...s.answers, correct];
      setState({ phase:"feedback", lastOk:correct, score:newScore, answers:newAnswers });
    }, 600);
  }
  else if (action === "showHint") {
    setState({ hintShown: true });
  }
  else if (action === "nextPuzzle") {
    if (s.idx < s.puzzles.length - 1) {
      setState({ idx: s.idx+1, phase:"play", lastOk:null, hintShown:false });
    } else {
      const xpGained = s.score * DIFFICULTIES.find(d=>d.id===s.difficulty).xp;
      setState({ screen:"result", totalXP: s.totalXP + xpGained });
    }
  }
  else if (action === "retryPuzzle") {
    setState({ phase:"play", lastOk:null });
  }
  else if (action === "playAgain") {
    const xpGained = s.score * DIFFICULTIES.find(d=>d.id===s.difficulty).xp;
    const newTotalXP = s.totalXP + (s.screen === "play" ? 0 : xpGained);
    const puzzles = pickPuzzles(s.worldId, s.difficulty);
    setState({ screen:"play", puzzles, idx:0, phase:"play", answers:[], score:0, hintShown:false, lastOk:null, totalXP: newTotalXP });
  }
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
render();
</script>
