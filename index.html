<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThinkQuest</title>
<style>
  :root {
    --bg:#0f0f1a;--text:#f0f0ff;--muted:#8888aa;--border:#2a2a4a;
    --p:#7c3aed;--p2:#a78bfa;--cyan:#06b6d4;
    --green:#10b981;--amber:#f59e0b;--red:#ef4444;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
  button{font-family:inherit;cursor:pointer}
  #app{min-height:100vh}

.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* Nav */
.nav{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.back-btn{background:rgba(255,255,255,.1);border:none;border-radius:11px;color:#fff;width:36px;height:36px;font-size:17px;display:flex;align-items:center;justify-content:center}

/* Cards */
.card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:18px;padding:14px 18px;margin-bottom:11px;display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:none;transition:transform .15s}
.card:active{transform:scale(.97)}
.avatar-circle{font-size:30px;width:50px;height:50px;background:rgba(124,58,237,.2);border:1.5px solid rgba(124,58,237,.4);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Avatar grid */
.av-btn{font-size:28px;width:52px;height:52px;border-radius:13px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;transition:all .2s}
.av-btn.sel{background:rgba(124,58,237,.35);border-color:#a78bfa}

/* Difficulty */
.diff-btn{width:100%;border-radius:20px;padding:18px 20px;margin-bottom:13px;display:flex;align-items:center;gap:15px;background:rgba(255,255,255,.05);text-align:left;transition:transform .15s;border:none}
.diff-btn:active{transform:scale(.97)}
.diff-icon{font-size:32px;width:54px;height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Play */
.puzzle-body{flex:1;overflow-y:auto;padding:16px 14px 28px}
.question{font-size:16px;font-weight:700;line-height:1.6;margin-bottom:18px;white-space:pre-line;color:#fff}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{border-radius:16px;padding:17px 10px;color:#fff;font-size:15px;font-weight:700;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);line-height:1.3;white-space:pre-line;width:100%}
.opt.ok{background:rgba(16,185,129,.3)!important;border:2px solid #10b981!important}
.opt.bad{background:rgba(239,68,68,.25)!important;border:2px solid #ef4444!important}
.elims{display:flex;flex-wrap:wrap;gap:9px}
.elim{border-radius:13px;padding:13px 15px;color:#fff;font-size:15px;font-weight:700;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);flex:1 1 auto;min-width:68px}
.elim.ok{background:rgba(16,185,129,.3)!important;border:2px solid #10b981!important}
.elim.bad{background:rgba(239,68,68,.25)!important;border:2px solid #ef4444!important}
.hint-btn{margin-top:13px;background:none;border:1px dashed rgba(255,255,255,.2);border-radius:12px;color:#999;padding:9px 14px;font-size:12px;width:100%}
.hint-box{margin-top:11px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:13px;padding:11px 14px;font-size:13px;color:#fcd34d;line-height:1.5}
.fb-box{border-radius:17px;padding:17px;margin-bottom:13px}
.fb-ok{background:rgba(16,185,129,.15);border:1.5px solid #10b981}
.fb-bad{background:rgba(239,68,68,.12);border:1.5px solid #ef4444}
.dots{display:flex;gap:5px;justify-content:center}
.dot{height:8px;border-radius:4px;transition:all .3s}

/* Buttons */
.btn{width:100%;padding:14px;border-radius:16px;font-weight:800;font-size:15px;border:none;color:#fff;margin-bottom:10px}
.btn-ghost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)!important}
.btn-danger{background:none;border:none;color:#ef4444;font-size:13px;padding:8px;width:100%;text-align:center}
.btn-text{background:none;border:none;color:#777;font-size:13px;padding:8px;width:100%;text-align:center}

/* XP / Progress bars */
.xp-track{background:rgba(255,255,255,.12);border-radius:8px;height:7px;overflow:hidden;width:100%}
.xp-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#7c3aed,#06b6d4);transition:width .6s}
.prog-track{background:rgba(255,255,255,.1);border-radius:5px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:5px;transition:width .5s}

/* Input */
.txt-input{width:100%;padding:14px;border-radius:14px;background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:16px;font-weight:700;outline:none;box-sizing:border-box;font-family:inherit}
.txt-input::placeholder{color:#555}
.err-msg{color:#f87171;font-size:13px;margin-bottom:10px}

/* Stat boxes */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:900;margin-bottom:3px}
.stat-lbl{font-size:11px;color:#888}

/* Leaderboard */
.lb-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:12px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.lb-row.me{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4)!important}

/* Result */
.result-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}

.pad{padding:16px 14px 30px}
.section-label{font-size:11px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .2s ease}
</style>

</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const AVATARS = ["🧒","👧","🧑","👦","🧙","🦸","🧝","🐉","🦊","🐼","🦁","🐯"];

const WORLDS = [
{id:“patterns”,name:“Cipher Caves”,    emoji:“🔍”,color:”#7c3aed”,light:”#a78bfa”,bg:”#1a0f3a”,desc:“Spot the rule, crack the code”},
{id:“logic”,   name:“Detective HQ”,   emoji:“🔎”,color:”#0891b2”,light:”#67e8f9”,bg:”#0a1f2e”,desc:“Use clues to find the truth”},
{id:“combos”,  name:“Alchemist’s Lab”,emoji:“🧪”,color:”#059669”,light:”#6ee7b7”,bg:”#0a2018”,desc:“Count every possibility”},
{id:“strategy”,name:“Strategy Citadel”,emoji:“♟️”,color:”#b45309”,light:”#fcd34d”,bg:”#1f1500”,desc:“Think ahead, outsmart opponents”},
];

const DIFFS = [
{id:“easy”,  label:“Easy”,  emoji:“🌱”,desc:“Simple, 1-step problems”,   color:”#10b981”,xp:5},
{id:“medium”,label:“Medium”,emoji:“🌿”,desc:“2–3 steps, some tricky bits”,color:”#f59e0b”,xp:10},
{id:“hard”,  label:“Hard”,  emoji:“🔥”,desc:“Multi-step, real brain work”,color:”#ef4444”,xp:15},
];

const XP_LEVELS = [0,50,120,220,350,520,730,980,1270,1600,2000];
const TITLES    = [“Newcomer”,“Explorer”,“Thinker”,“Reasoner”,“Strategist”,“Mastermind”,“Champion”,“Prodigy”,“Genius”,“Legend”,“Grand Master”];

function xpLv(xp)  { let l=1; XP_LEVELS.forEach((v,i)=>{ if(xp>=v) l=i+1; }); return Math.min(l,XP_LEVELS.length); }
function xpPct(xp) { const l=xpLv(xp),base=XP_LEVELS[l-1],next=XP_LEVELS[l]||base+500; return Math.round(((xp-base)/(next-base))*100); }
function xpNext(xp){ const l=xpLv(xp); return l>=XP_LEVELS.length?null:XP_LEVELS[l]; }

// ═══════════════════════════════════════════════
// QUESTION BANK
// ═══════════════════════════════════════════════
const BANK = {
patterns:{
easy:[
{type:“tap”,q:“What comes next?\n🔴 🔵 🔴 🔵 🔴 ___”,options:[“🔴”,“🔵”,“🟡”,“🟢”],answer:1,hint:“Look at every 2nd position.”,explain:“Unit is RED→BLUE repeating. Position 6 = 🔵.”},
{type:“tap”,q:“Which number comes next?\n2, 4, 6, 8, ___”,options:[“9”,“10”,“11”,“12”],answer:1,hint:“What is the gap between each number?”,explain:“Add 2 each time. 8+2=10.”},
{type:“elim”,q:“Tap the shape that comes next:\n▲ ■ ▲ ■ ▲ ___”,items:[“▲”,“■”,“●”,“★”],answer:1,hint:“What appears at every 2nd position?”,explain:“Pattern unit is (▲ ■). Position 6 = ■.”},
{type:“tap”,q:“Which number is missing?\n1, 2, 3, ___, 5, 6”,options:[“2”,“4”,“5”,“7”],answer:1,hint:“Count up from 1.”,explain:“The sequence counts up by 1. After 3 comes 4.”},
{type:“tap”,q:“5, 10, 15, 20, ___”,options:[“22”,“24”,“25”,“30”],answer:2,hint:“What do you add each time?”,explain:“Add 5 each time. 20+5=25.”},
{type:“tap”,q:“A B A B A ___”,options:[“A”,“B”,“C”,“D”],answer:1,hint:“The pattern repeats in pairs.”,explain:“A and B alternate. After A comes B.”},
{type:“elim”,q:“Odd one out:\nDog  Cat  Rose  Fish”,items:[“Dog”,“Cat”,“Rose”,“Fish”],answer:2,hint:“Three are animals. One is not.”,explain:“Rose is a plant. Dog, Cat, Fish are all animals.”},
{type:“tap”,q:“10, 20, 30, ___”,options:[“35”,“38”,“40”,“45”],answer:2,hint:“You add the same number each time.”,explain:“Add 10 each time. 30+10=40.”},
{type:“elim”,q:“Which colour comes next?\n🟥 🟦 🟥 🟦 ___”,items:[“🟥”,“🟦”,“🟨”,“🟩”],answer:0,hint:“Two colours alternate.”,explain:“Red and Blue alternate. After 🟦 comes 🟥.”},
{type:“tap”,q:“🌙 ⭐ 🌙 ⭐ 🌙 ___”,options:[“🌙”,“⭐”,“☀️”,“🌍”],answer:1,hint:“Two symbols alternate.”,explain:“Moon and Star alternate. After 🌙 comes ⭐.”},
],
medium:[
{type:“tap”,q:“Two rules change at once.\nSmall🔴 Big🔴 Small🔵 Big🔵 Small🔴 ___”,options:[“Small🔵”,“Big🔴”,“Big🔵”,“Small🔴”],answer:1,hint:“Track SIZE and COLOUR separately.”,explain:“Size: S,B,S,B,S→B. Colour: R,R,B,B,R→R. Answer: Big🔴.”},
{type:“tap”,q:“Find the next number:\n3, 6, 5, 10, 9, ***”,options:[“10”,“18”,“8”,“12”],answer:1,hint:“Look at pairs — does the rule alternate?”,explain:“Alternates ×2 then −1. After 9: 9×2=18.”},
{type:“elim”,q:“Which tile is MISSING?\nRow1: 🔴🔵🟡\nRow2: 🔵🟡🔴\nRow3: 🟡 ___ 🔵”,items:[“🔴”,“🔵”,“🟡”,“🟢”],answer:0,hint:“Each row uses all 3 colours once.”,explain:“Row 3 has 🟡 and 🔵. Missing = 🔴.”},
{type:“tap”,q:“What is the rule?\n2→6, 3→9, 5→15, 4→***”,options:[“10”,“12”,“14”,“16”],answer:1,hint:“What do you do to the input number?”,explain:“Rule is ×3. So 4×3=12.”},
{type:“tap”,q:“1, 4, 9, 16, ___”,options:[“20”,“25”,“24”,“18”],answer:1,hint:“Try squaring 1, 2, 3, 4…”,explain:“Square numbers: 1²,2²,3²,4²,5²=25.”},
{type:“elim”,q:“Which breaks the pattern?\n2  4  6  9  10  12”,items:[“4”,“6”,“9”,“10”],answer:2,hint:“All numbers should be even.”,explain:“9 is odd. All others are even.”},
{type:“tap”,q:“100, 90, 80, 70, ***”,options:[“65”,“60”,“55”,“50”],answer:1,hint:“What is being subtracted each time?”,explain:“Subtract 10 each time. 70−10=60.”},
{type:“tap”,q:“Find the rule:\n5→8, 10→13, 3→6, 7→***”,options:[“9”,“10”,“11”,“12”],answer:1,hint:“What is being added to each input?”,explain:“Rule is +3. So 7+3=10.”},
{type:“tap”,q:“What comes next?\n1, 1, 2, 3, 5, 8, ___”,options:[“11”,“12”,“13”,“14”],answer:2,hint:“Add the two previous numbers together.”,explain:“Each number = sum of previous two. 5+8=13.”},
{type:“elim”,q:“Odd one out:\n4  8  12  15  20”,items:[“8”,“12”,“15”,“20”],answer:2,hint:“All should be multiples of 4.”,explain:“15 is not a multiple of 4. The others are.”},
],
hard:[
{type:“tap”,q:“Sequence has TWO alternating rules.\n1, 2, 6, 7, 21, 22, ___”,options:[“23”,“66”,“44”,“42”],answer:1,hint:“Split into two interleaved sub-sequences.”,explain:“Even steps: +1. Odd steps: ×3. After 22: 22×3=66.”},
{type:“elim”,q:“Which has a DIFFERENT rule from the others?”,items:[“1,4,9,16”,“4,9,16,25”,“2,4,8,16”,“1,9,25,49”],answer:2,hint:“Three are square sequences. One is not.”,explain:“2,4,8,16 = powers of 2. Others are all squares.”},
{type:“tap”,q:“INPUT → ×2 → −3 → ×2\nInput=5. Output=?”,options:[“11”,“14”,“10”,“7”],answer:1,hint:“Apply each step one at a time.”,explain:“5×2=10, 10−3=7, 7×2=14.”},
{type:“tap”,q:“Rule: output = (input+3)×2\nWhich input gives output 16?”,options:[“4”,“5”,“6”,“7”],answer:1,hint:“Work backwards: 16÷2=8, then 8−3=?”,explain:“16÷2=8, 8−3=5. Input=5.”},
{type:“tap”,q:“Grid:\nRow1: 1, 2, 3\nRow2: 2, 4, 6\nRow3: 3, 6, ___”,options:[“7”,“8”,“9”,“10”],answer:2,hint:“Look at both the row rule AND the column rule.”,explain:“Row×Column. Row3,Col3 = 3×3=9.”},
{type:“tap”,q:“f(x) = x×x − 1\nf(4) = ?”,options:[“13”,“14”,“15”,“16”],answer:2,hint:“First square 4, then subtract 1.”,explain:“4×4=16, 16−1=15.”},
],
},
logic:{
easy:[
{type:“elim”,q:“Alice, Ben, Cara each have one pet.\n① Ben ≠ cat  ② Cara = fish\nWho has the CAT?”,items:[“Alice”,“Ben”,“Cara”],answer:0,hint:“Start with what’s certain: Cara has the fish.”,explain:“Cara=fish. Ben≠cat so Ben=dog. Alice gets the cat.”},
{type:“tap”,q:“Tom > Sam in height.\nSam > Jay in height.\nIs Tom taller than Jay?”,options:[“Yes”,“No”,“Can’t tell”,“Sometimes”],answer:0,hint:“Can you chain the two facts?”,explain:“Tom>Sam AND Sam>Jay → Tom>Jay. Yes.”},
{type:“tap”,q:“All dogs are animals.\nRex is a dog.\nIs Rex an animal?”,options:[“Yes”,“No”,“Maybe”,“Sometimes”],answer:0,hint:“The rule applies to ALL dogs.”,explain:“All dogs are animals. Rex is a dog. So Rex is an animal.”},
{type:“elim”,q:“Red, Blue, Green pencils.\n① Mia ≠ Red  ② Sam = Blue\nWho has Red?”,items:[“Mia”,“Sam”,“Leo”],answer:2,hint:“Sam’s colour is given. Then eliminate.”,explain:“Sam=Blue. Mia≠Red so Mia=Green. Leo has Red.”},
{type:“tap”,q:“Anna is older than Ben.\nBen is older than Cara.\nWho is the youngest?”,options:[“Anna”,“Ben”,“Cara”,“Can’t tell”],answer:2,hint:“Chain the two age facts.”,explain:“Anna>Ben>Cara. Cara is the youngest.”},
{type:“elim”,q:“Ball is NOT in A.\nBall is NOT in B.\nWhere is the ball?”,items:[“Box A”,“Box B”,“Box C”],answer:2,hint:“Eliminate the impossible options.”,explain:“Not A, not B — it must be in C.”},
{type:“tap”,q:“No fish can walk.\nGoldie is a fish.\nCan Goldie walk?”,options:[“Yes”,“No”,“Maybe”,“Sometimes”],answer:1,hint:“Apply the rule directly.”,explain:“No fish can walk. Goldie is a fish. So Goldie cannot walk.”},
{type:“tap”,q:“P is TRUE. Q is FALSE.\nWhat is P AND Q?”,options:[“True”,“False”,“Maybe”,“Depends”],answer:1,hint:“AND requires BOTH to be true.”,explain:“true AND false = FALSE.”},
],
medium:[
{type:“tap”,q:“If A→B and B→C,\nwhich MUST be true?”,options:[“A→C only”,“C→A only”,“Both”,“Neither”],answer:0,hint:“Arrows chain forward but do not reverse.”,explain:“A→B and B→C means A→C. But C→A is not guaranteed.”},
{type:“elim”,q:“Three boxes. One has gold.\nA:‘Gold is in B’  B:‘Gold not here’  C:‘Gold in A’\nExactly ONE label is true. Where?”,items:[“Box A”,“Box B”,“Box C”],answer:1,hint:“Try placing gold in each box. Count true statements.”,explain:“Gold in B: A=true, B=false, C=false → exactly 1 true ✓”},
{type:“tap”,q:“Some birds can’t fly.\nTweety is a bird.\nCan Tweety definitely fly?”,options:[“Yes”,“No”,“Maybe”,“Always”],answer:2,hint:”‘Some’ birds can’t fly — we don’t know which kind.”,explain:“We can’t be certain. Tweety might or might not fly.”},
{type:“tap”,q:“If NOT A → B. B is false.\nWhat can we say about A?”,options:[“A is false”,“A is true”,“Can’t tell”,“Maybe true”],answer:1,hint:“If B is false, what must be true?”,explain:“Not A→B. B=false. So ‘not A’ must be false. Therefore A is true.”},
{type:“tap”,q:“All mammals are warm-blooded.\nWhales are mammals.\nAre whales warm-blooded?”,options:[“Yes”,“No”,“Maybe”,“Can’t tell”],answer:0,hint:“Apply: if ALL mammals, then whales too.”,explain:“All mammals are warm-blooded. Whales are mammals. Yes.”},
{type:“tap”,q:“Anna, Bo, Cal, Dana like colours.\n① Anna≠red  ② Bo=blue\n③ Cal≠green  ④ Dana≠yellow\nWho CAN have red?”,options:[“Anna”,“Bo”,“Cal”,“Dana”],answer:2,hint:“Eliminate who can’t have red.”,explain:“Bo=blue. Anna≠red. Cal has no restriction on red.”},
],
hard:[
{type:“tap”,q:“Knights tell truth. Knaves lie.\nA:‘B is a knight.’ B:‘A and I are different.’\nWhat are they?”,options:[“Both knights”,“Both knaves”,“A=knight B=knave”,“A=knave B=knight”],answer:1,hint:“Assume A is a knight and follow all consequences.”,explain:“If A is knight: B is knight. B says ‘we’re different’=false. Contradiction. Both are knaves.”},
{type:“elim”,q:“4 suspects. One did it. Only ONE statement is true.\nA:‘It was B.’ B:‘It was C.’\nC:‘Not me.’ D:‘A is lying.’\nWho did it?”,items:[“A”,“B”,“C”,“D”],answer:3,hint:“Try each suspect. Count true statements.”,explain:“If D did it: A=false, B=false, C=true, D=false → exactly 1 true ✓”},
{type:“tap”,q:“If A then B. If B then C. If C then D.\nD is false. What follows?”,options:[“A is false”,“B is false”,“C is false”,“All of the above”],answer:3,hint:“Work backwards from D being false.”,explain:“D=false→C=false→B=false→A=false. All false.”},
{type:“tap”,q:“P=true, Q=false, R=true.\nWhat is (P OR Q) AND (NOT R)?”,options:[“True”,“False”,“Maybe”,“Depends”],answer:1,hint:“Solve each bracket first.”,explain:”(P OR Q)=true. (NOT R)=false. true AND false = FALSE.”},
{type:“tap”,q:“100 lockers. Student n toggles every nth locker.\nWhich locker stays OPEN?”,options:[“Locker 50”,“Locker 25”,“Locker 36”,“Locker 64”],answer:2,hint:“A locker stays open if toggled an odd number of times.”,explain:“Only perfect squares have an odd number of factors. 36=6².”},
],
},
combos:{
easy:[
{type:“tap”,q:“2 shirts (Red, Blue) + 3 hats (A,B,C).\nHow many outfit combinations?”,options:[“5”,“6”,“4”,“8”],answer:1,hint:“For EVERY shirt, how many hat choices?”,explain:“2×3=6. Multiply, don’t add.”},
{type:“tap”,q:“Alice, Ben, Cara sit in a row.\nHow many different orders?”,options:[“3”,“4”,“6”,“9”],answer:2,hint:“Fix Alice first. How many ways for Ben and Cara?”,explain:“3×2×1=6 orders.”},
{type:“elim”,q:“Which combo is MISSING?\nRed+A, Red+B, Blue+A, Blue+C, Red+C”,items:[“Blue+B”,“Red+A”,“Blue+C”,“Red+B”],answer:0,hint:“List all 6 combos systematically.”,explain:“Full list: Red+A,B,C and Blue+A,B,C. Blue+B is missing.”},
{type:“tap”,q:“A coin flipped twice.\nHow many different outcomes?”,options:[“2”,“3”,“4”,“5”],answer:2,hint:“List all: HH, HT, TH, TT…”,explain:“HH, HT, TH, TT = 4 outcomes.”},
{type:“tap”,q:“3 sandwiches + 2 drinks.\nHow many meal combinations?”,options:[“5”,“6”,“8”,“9”],answer:1,hint:“Multiply choices together.”,explain:“3×2=6 meal combinations.”},
{type:“tap”,q:“You roll a die (1–6).\nHow many possible outcomes?”,options:[“4”,“5”,“6”,“7”],answer:2,hint:“A die has faces numbered 1 through 6.”,explain:“6 faces = 6 possible outcomes.”},
{type:“tap”,q:“Ice cream: 2 flavours × 2 toppings.\nHow many combinations?”,options:[“2”,“3”,“4”,“6”],answer:2,hint:“For each flavour, how many topping choices?”,explain:“2×2=4 combinations.”},
],
medium:[

const STORE = “tq_profiles_v2”;
function loadProfiles(){ try{ return JSON.parse(localStorage.getItem(STORE))||[]; }catch{ return []; } }
function saveProfiles(p){ try{ localStorage.setItem(STORE,JSON.stringify(p)); }catch{} }
function mkProfile(name,avatar){
return {id:Date.now().toString(),name,avatar,xp:0,gamesPlayed:0,correctTotal:0,
worlds:{patterns:{games:0,correct:0},logic:{games:0,correct:0},combos:{games:0,correct:0},strategy:{games:0,correct:0}}};
}
function shuffle(arr){ return […arr].sort(()=>Math.random()-.5); }

// STATE
// ═══════════════════════════════════════════════
let profiles = loadProfiles();
let activeId = null;

let G = {
screen: profiles.length ? “picker” : “newprofile”,
worldId:null, diffId:null,
puzzles:[], idx:0, phase:“play”,
lastOk:null, answers:[], score:0, hintShown:false,
newAv:AVATARS[0], newName:””, newErr:””,
};

function profile(){ return profiles.find(p=>p.id===activeId)||null; }
function world()  { return WORLDS.find(w=>w.id===G.worldId)||null; }
function diff()   { return DIFFS.find(d=>d.id===G.diffId)||null; }

function set(patch){ Object.assign(G,patch); render(); }

function persist(updated){ profiles=updated; saveProfiles(profiles); }
function updateProfile(patch){
persist(profiles.map(p=>p.id===activeId?{…p,…patch}:p));
}

const xpGained=G.score*d.xp;
const newXP=p.xp; // already saved
const lv=xpLv(newXP);
const msg=pct===100?“Perfect! 🏆”:pct>=66?“Well done! 🎉”:pct>=33?“Good effort! 💪”:“Keep practising! 🔄”;
const stars=G.puzzles.map((_,i)=>`<span style="font-size:26px;filter:${i<G.score?'none':'grayscale(1) opacity(.25)'}">⭐</span>`).join(””);
return `<div class="screen active" style="background:${w.bg}">
<div class="result-wrap">
<div style="font-size:56px;margin-bottom:10px">${pct===100?“🏆”:pct>=66?“🎉”:“💪”}</div>
<div style="font-size:22px;font-weight:900;color:#fff;margin-bottom:5px">${msg}</div>
<div style="color:#ccc;font-size:14px;margin-bottom:5px">${G.score}/${G.puzzles.length} correct · ${d.emoji} ${d.label}</div>
<div style="color:${w.light};font-size:13px;font-weight:700;margin-bottom:18px">${w.name}</div>
<div style="background:rgba(255,255,255,.07);border-radius:20px;padding:20px;margin-bottom:18px;width:100%;max-width:300px">
<div style="display:flex;justify-content:center;gap:3px;margin-bottom:10px">${stars}</div>
<div style="font-size:26px;font-weight:900;color:${w.light}">+${xpGained} XP</div>
<div style="font-size:12px;color:#888;margin-top:3px">Total: ${newXP} XP · Level ${lv} ${TITLES[lv-1]}</div>
</div>
<button class="btn pop" data-a="playAgain" style="background:linear-gradient(135deg,${w.color},${w.light});max-width:300px">🔄 New Questions</button>
<button class="btn btn-ghost" data-a="goMap" style="max-width:300px">Back to Map</button>
</div>

  </div>`;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
const map={
picker:renderPicker, newprofile:renderNewProfile, map:renderMap,
profileview:renderProfileView, leaderboard:renderLeaderboard,
difficulty:renderDifficulty, play:renderPlay, result:renderResult,
};
document.getElementById(“app”).innerHTML=(map[G.screen]||renderPicker)();
bind();
const inp=document.getElementById(“nameInp”);
if(inp) inp.addEventListener(“input”,e=>{ G.newName=e.target.value; });
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
function bind(){
document.querySelectorAll(”[data-a]”).forEach(el=>{
el.addEventListener(“click”, handle);
});
}

function handle(e){
const a=e.currentTarget.dataset.a;
const id=e.currentTarget.dataset.id;
const av=e.currentTarget.dataset.av;
const i=parseInt(e.currentTarget.dataset.i);

if(a===“goPicker”)      set({screen:“picker”});
if(a===“goMap”)         set({screen:“map”});
if(a===“goLeaderboard”) set({screen:“leaderboard”});
if(a===“viewProfile”)   set({screen:“profileview”});
if(a===“goNewProfile”)  set({screen:“newprofile”,newName:””,newErr:””,newAv:AVATARS[0]});

if(a===“pickAv”) set({newAv:av});

if(a===“selectProfile”){ activeId=id; set({screen:“map”}); }

if(a===“createProfile”){
const n=(G.newName||””).trim();
if(n.length<2){ set({newErr:“Name needs at least 2 characters”}); return; }
const p=mkProfile(n,G.newAv);
persist([…profiles,p]);
activeId=p.id;
set({screen:“map”,newName:””,newErr:””});
}

if(a===“deleteProfile”){
if(!confirm(`Delete ${profile().name}? This cannot be undone.`)) return;
persist(profiles.filter(p=>p.id!==activeId));
activeId=null;
set({screen:profiles.length?“picker”:“newprofile”});
}

if(a===“selectWorld”) set({screen:“difficulty”,worldId:id});

if(a===“selectDiff”){
const puzzles=shuffle(BANK[G.worldId][id]).slice(0,3);
set({screen:“play”,diffId:id,puzzles,idx:0,phase:“play”,answers:[],score:0,hintShown:false,lastOk:null});
}

if(a===“answer”){
if(G.phase!==“play”) return;
const p=G.puzzles[G.idx];
const ok=i===p.answer;
// Visual highlight before state change
document.querySelectorAll(”[data-a=‘answer’]”).forEach((btn,bi)=>{
if(bi===p.answer) btn.classList.add(“ok”);
else if(bi===i&&!ok) btn.classList.add(“bad”);
btn.style.cursor=“default”;
});
const newAnswers=[…G.answers,ok];
const newScore=ok?G.score+1:G.score;
setTimeout(()=>set({phase:“feedback”,lastOk:ok,score:newScore,answers:newAnswers}),600);
}

if(a===“showHint”) set({hintShown:true});

if(a===“retry”) set({phase:“play”,lastOk:null});

if(a===“next”){
if(G.idx<G.puzzles.length-1){
set({idx:G.idx+1,phase:“play”,lastOk:null,hintShown:false});
} else {
// Save stats
const p=profile(); const d=diff();
const xpGained=G.score*d.xp;
const nw={…p.worlds};
nw[G.worldId]={games:(nw[G.worldId]?.games||0)+1,correct:(nw[G.worldId]?.correct||0)+G.score};
updateProfile({xp:p.xp+xpGained,gamesPlayed:p.gamesPlayed+1,correctTotal:p.correctTotal+G.score,worlds:nw});
set({screen:“result”});
}
}

if(a===“playAgain”){
const puzzles=shuffle(BANK[G.worldId][G.diffId]).slice(0,3);
set({screen:“play”,puzzles,idx:0,phase:“play”,answers:[],score:0,hintShown:false,lastOk:null});
}
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
render();
</script>

</body>
</html>
