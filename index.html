<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThinkQuest</title>
<style>
  :root {
    --bg:#0f0f1a; --card:#1a1a2e; --card2:#16213e;
    --p:#7c3aed; --p2:#a78bfa; --cyan:#06b6d4;
    --green:#10b981; --amber:#f59e0b; --red:#ef4444;
    --text:#f0f0ff; --muted:#8888aa; --border:#2a2a4a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
  button{font-family:inherit;cursor:pointer}
  #app{min-height:100vh}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ── NAV ── */
.nav{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.back{background:rgba(255,255,255,.1);border:none;border-radius:11px;color:#fff;width:36px;height:36px;font-size:17px;display:flex;align-items:center;justify-content:center}
.nav-title{font-weight:800;font-size:16px;color:#fff;flex:1}

/* ── CARDS ── */
.world-card{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:15px 16px;margin-bottom:11px;display:flex;align-items:center;gap:13px;width:100%;text-align:left;transition:transform .15s}
.world-card:active{transform:scale(.97)}
.world-icon{font-size:26px;width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.world-card h3{font-size:14px;font-weight:800;color:#fff;margin-bottom:2px}
.world-card p{font-size:12px;color:#888}

/* ── PROFILE CARD ── */
.profile-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:18px;padding:14px 18px;margin-bottom:11px;display:flex;align-items:center;gap:14px;width:100%;text-align:left;transition:transform .15s}
.profile-card:active{transform:scale(.97)}
.avatar-circle{font-size:30px;width:50px;height:50px;background:rgba(124,58,237,.2);border:1.5px solid rgba(124,58,237,.4);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── AVATAR GRID ── */
.avatar-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.av-btn{font-size:28px;width:52px;height:52px;border-radius:13px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;transition:all .2s}
.av-btn.selected{background:rgba(124,58,237,.35);border-color:#a78bfa}

/* ── DIFFICULTY ── */
.diff-btn{width:100%;border-radius:20px;padding:18px 20px;margin-bottom:13px;display:flex;align-items:center;gap:15px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);text-align:left;transition:transform .15s}
.diff-btn:active{transform:scale(.97)}
.diff-icon{font-size:32px;width:54px;height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.diff-btn h3{font-size:17px;font-weight:800;color:#fff;margin-bottom:2px}
.diff-btn p{font-size:12px;color:#aaa}

/* ── PLAY ── */
.puzzle-body{flex:1;overflow-y:auto;padding:16px 14px 28px}
.level-badge{display:inline-block;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;margin-bottom:13px}
.question{font-size:16px;font-weight:700;line-height:1.6;margin-bottom:18px;white-space:pre-line;color:#fff}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{border-radius:16px;padding:17px 10px;color:#fff;font-size:15px;font-weight:700;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);transition:all .2s;line-height:1.3;white-space:pre-line}
.opt.ok{background:rgba(16,185,129,.3)!important;border:2px solid #10b981!important}
.opt.bad{background:rgba(239,68,68,.25)!important;border:2px solid #ef4444!important}
.elims{display:flex;flex-wrap:wrap;gap:9px}
.elim{border-radius:13px;padding:13px 15px;color:#fff;font-size:15px;font-weight:700;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);transition:all .2s;flex:1 1 auto;min-width:68px}
.elim.ok{background:rgba(16,185,129,.3)!important;border:2px solid #10b981!important}
.elim.bad{background:rgba(239,68,68,.25)!important;border:2px solid #ef4444!important}
.hint-btn{margin-top:13px;background:none;border:1px dashed rgba(255,255,255,.2);border-radius:12px;color:#999;padding:9px 14px;font-size:12px;width:100%}
.hint-box{margin-top:11px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:13px;padding:11px 14px;font-size:13px;color:#fcd34d;line-height:1.5}
.fb-box{border-radius:17px;padding:17px;margin-bottom:13px}
.fb-ok{background:rgba(16,185,129,.15);border:1.5px solid #10b981}
.fb-bad{background:rgba(239,68,68,.12);border:1.5px solid #ef4444}
.fb-title{font-weight:800;font-size:17px;margin-bottom:7px;color:#fff}
.fb-text{font-size:14px;color:#fff;line-height:1.6}
.dots{display:flex;gap:5px;justify-content:center}
.dot{height:8px;border-radius:4px;transition:all .3s}

/* ── BUTTONS ── */
.btn{width:100%;padding:14px;border-radius:16px;font-weight:800;font-size:15px;border:none;color:#fff;margin-bottom:10px}
.btn-ghost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
.btn-text{background:none;border:none;color:#777;font-size:13px;padding:8px;width:100%;text-align:center}

/* ── XP BAR ── */
.xp-track{background:rgba(255,255,255,.12);border-radius:8px;height:7px;overflow:hidden;width:100%}
.xp-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#7c3aed,#06b6d4);transition:width .6s}

/* ── PROGRESS BARS ── */
.prog-track{background:rgba(255,255,255,.1);border-radius:5px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:5px;transition:width .5s}

/* ── INPUT ── */
.txt-input{width:100%;padding:14px;border-radius:14px;background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:16px;font-weight:700;outline:none;box-sizing:border-box;font-family:inherit}
.txt-input::placeholder{color:#555}
.err{color:#f87171;font-size:13px;margin-bottom:10px}

/* ── STAT BOXES ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:900;margin-bottom:3px}
.stat-lbl{font-size:11px;color:#888}

/* ── LEADERBOARD ── */
.lb-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:12px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.lb-row.me{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4)}

/* ── RESULT ── */
.result-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}

/* ── PAGE PAD ── */
.pad{padding:16px 14px 30px}

@keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .25s ease}
</style>

</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const AVATARS = ["🧒","👧","🧑","👦","🧙","🦸","🧝","🐉","🦊","🐼","🦁","🐯"];

const WORLDS = [
{id:“patterns”,name:“Cipher Caves”,    emoji:“🔍”,color:”#7c3aed”,light:”#a78bfa”,bg:”#1a0f3a”,desc:“Spot the rule, crack the code”},
{id:“logic”,   name:“Detective HQ”,   emoji:“🔎”,color:”#0891b2”,light:”#67e8f9”,bg:”#0a1f2e”,desc:“Use clues to find the truth”},
{id:“combos”,  name:“Alchemist’s Lab”,emoji:“🧪”,color:”#059669”,light:”#6ee7b7”,bg:”#0a2018”,desc:“Count every possibility”},
{id:“strategy”,name:“Strategy Citadel”,emoji:“♟️”,color:”#b45309”,light:”#fcd34d”,bg:”#1f1500”,desc:“Think ahead, outsmart opponents”},
];

const DIFFS = [
{id:“easy”,  label:“Easy”,  emoji:“🌱”,desc:“Simple, 1-step problems”,  color:”#10b981”,xp:5},
{id:“medium”,label:“Medium”,emoji:“🌿”,desc:“2–3 steps, some tricky bits”,color:”#f59e0b”,xp:10},
{id:“hard”,  label:“Hard”,  emoji:“🔥”,desc:“Multi-step, real brain work”,color:”#ef4444”,xp:15},
];

// XP thresholds per level (level = index+1)
const XP_LEVELS = [0,50,120,220,350,520,730,980,1270,1600,2000];
function xpLevel(xp){ let l=1; for(let i=0;i<XP_LEVELS.length;i++) if(xp>=XP_LEVELS[i]) l=i+1; return Math.min(l,XP_LEVELS.length); }
function xpForNext(xp){ const l=xpLevel(xp); return l>=XP_LEVELS.length?null:XP_LEVELS[l]; }
function xpProgress(xp){ const l=xpLevel(xp); const base=XP_LEVELS[l-1]; const next=XP_LEVELS[l]||XP_LEVELS[l-1]+500; return Math.round(((xp-base)/(next-base))*100); }
function levelTitle(l){ const titles=[“Newcomer”,“Explorer”,“Thinker”,“Reasoner”,“Strategist”,“Mastermind”,“Champion”,“Prodigy”,“Genius”,“Legend”,“Grand Master”]; return titles[Math.min(l-1,titles.length-1)]; }

// ═══════════════════════════════════════════════════════
// QUESTION BANK
// ═══════════════════════════════════════════════════════
const BANK = {
patterns:{
easy:[
{type:“tap”,q:“What comes next?\n🔴 🔵 🔴 🔵 🔴 ___”,options:[“🔴”,“🔵”,“🟡”,“🟢”],answer:1,hint:“Look at every 2nd position.”,explain:“Unit is RED→BLUE repeating. Position 6 = 🔵.”},
{type:“tap”,q:“Which number comes next?\n2, 4, 6, 8, ___”,options:[“9”,“10”,“11”,“12”],answer:1,hint:“What is the gap between each number?”,explain:“Add 2 each time. 8 + 2 = 10.”},
{type:“elim”,q:“Tap the shape that comes next:\n▲ ■ ▲ ■ ▲ ___”,items:[“▲”,“■”,“●”,“★”],answer:1,hint:“What appears at every 2nd position?”,explain:“Pattern unit is (▲ ■). Position 6 = ■.”},
{type:“tap”,q:“Which number is missing?\n1, 2, 3, ___, 5, 6”,options:[“2”,“4”,“5”,“7”],answer:1,hint:“Count up from 1.”,explain:“The sequence counts up by 1. After 3 comes 4.”},
{type:“elim”,q:“Which colour comes next?\n🟥 🟦 🟥 🟦 ___”,items:[“🟥”,“🟦”,“🟨”,“🟩”],answer:0,hint:“The pattern alternates between two colours.”,explain:“Red and Blue alternate. After 🟦 comes 🟥.”},
{type:“tap”,q:“5, 10, 15, 20, ___”,options:[“22”,“24”,“25”,“30”],answer:2,hint:“What do you add each time?”,explain:“Add 5 each time. 20 + 5 = 25.”},
{type:“tap”,q:“A B A B A ___”,options:[“A”,“B”,“C”,“D”],answer:1,hint:“The pattern repeats in pairs.”,explain:“A and B alternate. After A comes B.”},
{type:“elim”,q:“Which is the ODD ONE OUT?\nDog  Cat  Rose  Fish”,items:[“Dog”,“Cat”,“Rose”,“Fish”],answer:2,hint:“Three are animals. One is not.”,explain:“Rose is a plant. Dog, Cat, and Fish are all animals.”},
{type:“tap”,q:“10, 20, 30, ___”,options:[“35”,“38”,“40”,“45”],answer:2,hint:“You add the same number each time.”,explain:“Add 10 each time. 30 + 10 = 40.”},
{type:“elim”,q:“Which number comes next?\n3, 6, 9, 12, ___”,items:[“13”,“14”,“15”,“16”],answer:2,hint:“What is the gap between numbers?”,explain:“Add 3 each time. 12 + 3 = 15.”},
{type:“tap”,q:“🌙 ⭐ 🌙 ⭐ 🌙 ___”,options:[“🌙”,“⭐”,“☀️”,“🌍”],answer:1,hint:“Two symbols alternate.”,explain:“Moon and Star alternate. After 🌙 comes ⭐.”},
{type:“elim”,q:“Odd one out:\nApple  Banana  Carrot  Orange”,items:[“Apple”,“Banana”,“Carrot”,“Orange”],answer:2,hint:“Three are fruits. One is a vegetable.”,explain:“Carrot is a vegetable. The others are fruits.”},
],
medium:[
{type:“tap”,q:“Two rules change at once.\nSmall🔴 Big🔴 Small🔵 Big🔵 Small🔴 ___”,options:[“Small🔵”,“Big🔴”,“Big🔵”,“Small🔴”],answer:1,hint:“Track SIZE and COLOUR separately.”,explain:“Size: S,B,S,B,S→B. Colour: R,R,B,B,R→R. Answer: Big🔴.”},
{type:“tap”,q:“Find the next number:\n3, 6, 5, 10, 9, ***”,options:[“10”,“18”,“8”,“12”],answer:1,hint:“Look at pairs — does the rule alternate?”,explain:“Alternates ×2 then −1. After 9: 9×2=18.”},
{type:“elim”,q:“Which tile is MISSING?\nRow1: 🔴🔵🟡\nRow2: 🔵🟡🔴\nRow3: 🟡 ___ 🔵”,items:[“🔴”,“🔵”,“🟡”,“🟢”],answer:0,hint:“Each row uses all 3 colours once.”,explain:“Row 3 has 🟡 and 🔵. The missing colour is 🔴.”},
{type:“tap”,q:“What is the rule?\n2→6, 3→9, 5→15, 4→***”,options:[“10”,“12”,“14”,“16”],answer:1,hint:“What do you do to the input number?”,explain:“Rule is ×3. So 4×3=12.”},
{type:“tap”,q:“1, 4, 9, 16, ___”,options:[“20”,“25”,“24”,“18”],answer:1,hint:“Try squaring 1, 2, 3, 4…”,explain:“Square numbers: 1²,2²,3²,4²,5²=25.”},
{type:“elim”,q:“Which breaks the pattern?\n2  4  6  9  10  12”,items:[“4”,“6”,“9”,“10”],answer:2,hint:“All numbers should be even.”,explain:“9 is odd. All others are even numbers.”},
{type:“tap”,q:“100, 90, 80, 70, ***”,options:[“65”,“60”,“55”,“50”],answer:1,hint:“What is being subtracted each time?”,explain:“Subtract 10 each time. 70−10=60.”},
{type:“tap”,q:“Find the rule:\n5→8, 10→13, 3→6, 7→***”,options:[“9”,“10”,“11”,“12”],answer:1,hint:“What is being added to each input?”,explain:“Rule is +3. So 7+3=10.”},
{type:“tap”,q:“What comes next?\n1, 1, 2, 3, 5, 8, ___”,options:[“11”,“12”,“13”,“14”],answer:2,hint:“Add the two previous numbers together.”,explain:“Each number = sum of previous two. 5+8=13.”},
{type:“elim”,q:“Which number fits: always between 10 and 20”,items:[“9”,“15”,“21”,“7”],answer:1,hint:“Which is greater than 10 AND less than 20?”,explain:“15 is between 10 and 20. The others are outside this range.”},
],
hard:[
{type:“tap”,q:“Sequence has TWO alternating rules.\n1, 2, 6, 7, 21, 22, ___”,options:[“23”,“66”,“44”,“42”],answer:1,hint:“Split into two interleaved sub-sequences.”,explain:“Even steps: +1. Odd steps: ×3. After 22: 22×3=66.”},
{type:“elim”,q:“Which has a DIFFERENT rule from the others?”,items:[“1,4,9,16”,“4,9,16,25”,“2,4,8,16”,“1,9,25,49”],answer:2,hint:“Three are related to squares. One is not.”,explain:“2,4,8,16 = powers of 2. The others are square number sequences.”},
{type:“tap”,q:“INPUT → ×2 → −3 → ×2 → OUTPUT\nInput = 5. Output = ?”,options:[“11”,“14”,“10”,“7”],answer:1,hint:“Apply each operation one step at a time.”,explain:“5×2=10, 10−3=7, 7×2=14.”},
{type:“tap”,q:“Grid:\nRow1: 1, 2, 3\nRow2: 2, 4, 6\nRow3: 3, 6, ___”,options:[“7”,“8”,“9”,“10”],answer:2,hint:“Look at both the row rule AND the column rule.”,explain:“Row×Column. Row3,Col3 = 3×3=9.”},
{type:“tap”,q:“Rule: output = x×x − 1\nf(4) = ?”,options:[“13”,“14”,“15”,“16”],answer:2,hint:“First square 4, then subtract 1.”,explain:“4×4=16, 16−1=15.”},
{type:“elim”,q:“Which is NOT arithmetic (constant gap)?”,items:[“2,4,6,8”,“3,6,9,12”,“1,2,4,8”,“5,10,15,20”],answer:2,hint:“An arithmetic sequence adds the same number each time.”,explain:“1,2,4,8 doubles each time (×2), not a constant add.”},
{type:“tap”,q:“Rule: output = (input + 3) × 2\nWhich input gives output 16?”,options:[“4”,“5”,“6”,“7”],answer:1,hint:“Work backwards: 16÷2=8, then 8−3=?”,explain:“Reverse: 16÷2=8, 8−3=5. Input=5.”},
],
},
logic:{
easy:[
{type:“elim”,q:“Alice, Ben, Cara each have one pet.\n① Ben ≠ cat\n② Cara = fish\nWho has the CAT?”,items:[“Alice”,“Ben”,“Cara”],answer:0,hint:“Start with what’s certain: Cara has the fish.”,explain:“Cara=fish. Ben≠cat so Ben=dog. Alice gets the cat.”},
{type:“tap”,q:“Tom is taller than Sam.\nSam is taller than Jay.\nIs Tom taller than Jay?”,options:[“Yes”,“No”,“Can’t tell”,“Sometimes”],answer:0,hint:“Can you chain the two facts together?”,explain:“Tom>Sam AND Sam>Jay means Tom>Jay. Yes.”},
{type:“tap”,q:“All dogs are animals.\nRex is a dog.\nIs Rex an animal?”,options:[“Yes”,“No”,“Maybe”,“Sometimes”],answer:0,hint:“The rule applies to ALL dogs.”,explain:“All dogs are animals. Rex is a dog. So Rex is an animal.”},
{type:“tap”,q:“If it rains, Sara brings an umbrella.\nSara has her umbrella today.\nIs it definitely raining?”,options:[“Yes”,“No”,“Maybe”,“Always”],answer:2,hint:“Could Sara bring her umbrella for another reason?”,explain:“Rain→umbrella, but umbrella doesn’t prove rain. Maybe.”},
{type:“elim”,q:“Red, Blue, Green pencils.\n① Mia ≠ Red  ② Sam = Blue\nWho has Red?”,items:[“Mia”,“Sam”,“Leo”],answer:2,hint:“Sam’s colour is given. Then eliminate.”,explain:“Sam=Blue. Mia≠Red so Mia=Green. Leo has Red.”},
{type:“tap”,q:“All squares are rectangles.\nShape X is a square.\nIs Shape X a rectangle?”,options:[“Yes”,“No”,“Maybe”,“Can’t tell”],answer:0,hint:“If ALL squares are rectangles, what about Shape X?”,explain:“All squares ARE rectangles. Shape X is a square. So yes.”},
{type:“tap”,q:“Anna is older than Ben.\nBen is older than Cara.\nWho is the youngest?”,options:[“Anna”,“Ben”,“Cara”,“Can’t tell”],answer:2,hint:“Chain the two age facts together.”,explain:“Anna>Ben>Cara. Cara is the youngest.”},
{type:“elim”,q:“Ball is NOT in A. Ball is NOT in B.\nWhere is the ball?”,items:[“Box A”,“Box B”,“Box C”],answer:2,hint:“Eliminate the impossible options.”,explain:“Not A, not B — it must be in C.”},
{type:“tap”,q:“No fish can walk.\nGoldie is a fish.\nCan Goldie walk?”,options:[“Yes”,“No”,“Maybe”,“Sometimes”],answer:1,hint:“Apply the rule directly.”,explain:“No fish can walk. Goldie is a fish. So Goldie cannot walk.”},
{type:“tap”,q:“P is TRUE. Q is FALSE.\nWhat is P AND Q?”,options:[“True”,“False”,“Maybe”,“Depends”],answer:1,hint:“AND requires BOTH to be true.”,explain:“AND is only true when both are true. true AND false = FALSE.”},
],
medium:[
{type:“tap”,q:“If A→B and B→C,\nwhich MUST be true?”,options:[“A→C only”,“C→A only”,“Both”,“Neither”],answer:0,hint:“Arrows chain forward but do not reverse.”,explain:“A→B and B→C means A→C. But C→A is not guaranteed.”},
{type:“elim”,q:“Three boxes. One has gold.\nA:‘Gold is in B’  B:‘Gold not here’  C:‘Gold in A’\nExactly ONE label is true. Where?”,items:[“Box A”,“Box B”,“Box C”],answer:1,hint:“Try placing gold in each box and count true statements.”,explain:“Gold in B: A=true, B=false, C=false → exactly 1 true ✓”},
{type:“tap”,q:“Anna,Bo,Cal,Dana like colours.\n① Anna≠red  ② Bo=blue\n③ Cal≠green  ④ Dana≠yellow\nWho CAN have red?”,options:[“Anna”,“Bo”,“Cal”,“Dana”],answer:2,hint:“Eliminate who definitely can’t have red.”,explain:“Bo=blue. Anna≠red. Cal has no restriction on red.”},
{type:“tap”,q:“All mammals are warm-blooded.\nWhales are mammals.\nAre whales warm-blooded?”,options:[“Yes”,“No”,“Maybe”,“Can’t tell”],answer:0,hint:“Apply the rule: if ALL mammals, then whales too.”,explain:“All mammals are warm-blooded. Whales are mammals. Yes.”},
{type:“tap”,q:“Some birds can’t fly (penguins, ostriches).\nTweety is a bird.\nCan Tweety definitely fly?”,options:[“Yes”,“No”,“Maybe”,“Always”],answer:2,hint:”‘Some’ birds can’t fly — we don’t know which kind.”,explain:“We can’t be certain. Tweety might or might not be able to fly.”},
{type:“tap”,q:“If NOT A → B.\nB is false.\nWhat can we say about A?”,options:[“A is false”,“A is true”,“Can’t tell”,“A is maybe true”],answer:1,hint:“Work backwards: if B is false, what must be true?”,explain:“Not A → B. B=false. So ‘not A’ must be false. Therefore A is true.”},
],
hard:[

// STORAGE (localStorage)
// ═══════════════════════════════════════════════════════
const STORE_KEY = “tq_profiles_v1”;

function loadProfiles() {
try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
catch(e) { return []; }
}
function saveProfiles(profiles) {
try { localStorage.setItem(STORE_KEY, JSON.stringify(profiles)); } catch(e){}
}
function newProfile(name, avatar) {
return {
id: Date.now().toString(),
name, avatar,
xp: 0,
gamesPlayed: 0,
correctTotal: 0,
worlds: { patterns:{games:0,correct:0}, logic:{games:0,correct:0}, combos:{games:0,correct:0}, strategy:{games:0,correct:0} }
};
}

let profiles = loadProfiles();
let activeId = null;
let S = {
screen: profiles.length ? “picker” : “newprofile”,
worldId: null, diffId: null,
puzzles: [], idx: 0, phase: “play”,
lastOk: null, answers: [], score: 0, hintShown: false,
newAvatar: AVATARS[0], newName: “”, newErr: “”,
};

function profile() { return profiles.find(p=>p.id===activeId) || null; }
function world()   { return WORLDS.find(w=>w.id===S.worldId) || null; }
function diff()    { return DIFFS.find(d=>d.id===S.diffId) || null; }

function set(patch) { Object.assign(S, patch); render(); }

function pickPuzzles(wid, did) {
const pool = […BANK[wid][did]].sort(()=>Math.random()-.5);
return pool.slice(0,3);
}

function updateProfile(patch) {
profiles = profiles.map(p => p.id===activeId ? {…p,…patch} : p);
saveProfiles(profiles);
}

}

return `<div class="lb-row ${me?'me':''}"> <div style="font-size:22px;width:30px;text-align:center">${medals[i]||`${i+1}`}</div> <div style="font-size:28px;width:36px;text-align:center">${p.avatar}</div> <div style="flex:1"> <div style="font-weight:800;font-size:14px;color:${me?'#a78bfa':'#fff'}">${p.name}${me?' (you)':''}</div> <div style="font-size:11px;color:#888">Level ${lv} · ${p.gamesPlayed} games</div> </div> <div style="text-align:right"> <div style="font-weight:900;font-size:19px;color:#fcd34d">${p.xp}</div> <div style="font-size:11px;color:#666">XP</div> </div> </div>`;
}).join(””);

return `<div class="screen active" style="background:#0d0d1f"> <div class="nav"> <button class="back" data-action="goMap">←</button> <span class="nav-title">🏆 Leaderboard</span> </div> <div class="pad"> ${sorted.length ? rows : `<div style="text-align:center;color:#555;padding:40px">No players yet.</div>`}
</div>

  </div>`;
}

// ── DIFFICULTY ────────────────────────────────────────
function renderDifficulty() {
const w = world();
const btns = DIFFS.map(d => ` <button class="diff-btn" data-action="selectDiff" data-id="${d.id}" style="border-color:${d.color}44"> <div class="diff-icon" style="background:${d.color}22;border:1.5px solid ${d.color}55">${d.emoji}</div> <div style="flex:1;text-align:left"> <h3>${d.label}</h3> <p>${d.desc} · +${d.xp} XP/correct</p> </div> <span style="font-size:22px;color:${d.color}">›</span> </button>`).join(””);
return `<div class="screen active" style="background:${w.bg}">
<div class="nav">
<button class="back" data-action="goMap">←</button>
<span style="font-size:20px">${w.emoji}</span>
<span class="nav-title">${w.name}</span>
</div>
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 16px">
<div style="font-size:14px;color:#aaa;text-align:center;margin-bottom:22px">Choose your difficulty</div>
${btns}
</div>

  </div>`;
}

// ── PLAY ──────────────────────────────────────────────
function renderPlay() {
const w = world(), d = diff();
const puzzle = S.puzzles[S.idx];
const total = S.puzzles.length;

const dots = S.puzzles.map((_,i) => {
const w2 = i===S.idx?‘18px’:‘8px’;
const bg = i<S.answers.length ? (S.answers[i]?’#10b981’:’#ef4444’) : i===S.idx?w.light:‘rgba(255,255,255,.2)’;
return `<div class="dot" style="width:${w2};background:${bg}"></div>`;
}).join(””);

let body = “”;
if (S.phase === “play”) {
if (puzzle.type === “tap”) {
body = `<div class="opts-grid">${(puzzle.options||[]).map((o,i)=>`<button class="opt" data-action="answer" data-idx="${i}">${o}</button>`).join("")}</div>`;
} else {
body = `<p style="color:#aaa;font-size:12px;margin-bottom:10px">Tap your answer</p> <div class="elims">${(puzzle.items||[]).map((o,i)=>`<button class="elim" data-action="answer" data-idx="${i}">${o}</button>`).join("")}</div>`;
}
body += S.hintShown
? `<div class="hint-box">💡 ${puzzle.hint}</div>`
: `<button class="hint-btn" data-action="showHint">💡 Show hint</button>`;
} else {
const ok = S.lastOk;
body = `<div class="fb-box ${ok?'fb-ok':'fb-bad'}"> <div style="font-size:26px;margin-bottom:6px">${ok?"✅":"❌"}</div> <div class="fb-title">${ok?"Correct!":"Not quite…"}</div> <div class="fb-text">${puzzle.explain}</div> </div> ${ok ? `<button class="btn pop" data-action="next" style="background:linear-gradient(135deg,${w.color},${w.light})">${S.idx<total-1?“Next Puzzle →”:“See Results 🎯”}</button>`:`<button class="btn btn-ghost pop" data-action="retry">Try Again 🔄</button>` }`;
}

return `<div class="screen active" style="background:${w.bg}">
<div class="nav">
<button class="back" data-action="goMap">←</button>
<div style="flex:1">
<div style="font-size:12px;font-weight:700;color:#ccc">${w.emoji} ${w.name}</div>
<div style="font-size:11px;font-weight:600;color:${d.color}">${d.emoji} ${d.label}</div>
</div>
<div class="dots">${dots}</div>
</div>
<div class="puzzle-body">
<div class="level-badge" style="background:${d.color}22;border:1px solid ${d.color}66;color:${d.color}">Puzzle ${S.idx+1} of ${total}</div>
<div class="question">${puzzle.q}</div>
${body}
</div>

  </div>`;
}

// ── RESULT ────────────────────────────────────────────
function renderResult() {
const w = world(), d = diff(), p = profile();
const pct = Math.round((S.score/S.puzzles.length)*100);
const xpGained = S.score * d.xp;
const msg = pct===100?“Perfect! 🏆”:pct>=66?“Well done! 🎉”:pct>=33?“Good effort! 💪”:“Keep practising! 🔄”;
const newXP = p.xp + xpGained;
const lv = xpLevel(newXP);
const stars = S.puzzles.map((_,i)=>`<span style="font-size:28px;filter:${i<S.score?'none':'grayscale(1) opacity(.25)'}">⭐</span>`).join(””);

return `<div class="screen active" style="background:${w.bg}">
<div class="result-wrap">
<div style="font-size:56px;margin-bottom:10px">${pct===100?“🏆”:pct>=66?“🎉”:“💪”}</div>
<div style="font-size:22px;font-weight:900;color:#fff;margin-bottom:5px">${msg}</div>
<div style="color:#ccc;font-size:14px;margin-bottom:6px">${S.score}/${S.puzzles.length} correct · ${d.emoji} ${d.label}</div>
<div style="color:${w.light};font-size:13px;font-weight:700;margin-bottom:20px">${w.name}</div>
<div style="background:rgba(255,255,255,.07);border-radius:20px;padding:20px;margin-bottom:18px;width:100%;max-width:300px">
<div style="display:flex;justify-content:center;gap:3px;margin-bottom:10px">${stars}</div>
<div style="font-size:26px;font-weight:900;color:${w.light}">+${xpGained} XP</div>
<div style="font-size:12px;color:#888;margin-top:3px">Total: ${newXP} XP · Level ${lv} ${levelTitle(lv)}</div>
</div>
<button class="btn pop" data-action="playAgain" style="background:linear-gradient(135deg,${w.color},${w.light});max-width:300px">🔄 New Questions</button>
<button class="btn btn-ghost" data-action="goMap" style="max-width:300px">Back to Map</button>
</div>

  </div>`;
}

// ═══════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════
function bindEvents() {
// Name input live sync
const inp = document.getElementById(“newNameInput”);
if (inp) inp.addEventListener(“input”, e => { S.newName = e.target.value; });

document.querySelectorAll(”[data-action]”).forEach(el => {
el.addEventListener(“click”, handleAction);
});
}

function handleAction(e) {
const action = e.currentTarget.dataset.action;
const id     = e.currentTarget.dataset.id;
const idx    = parseInt(e.currentTarget.dataset.idx);
const av     = e.currentTarget.dataset.av;

if (action === “goPicker”)   { set({screen:“picker”}); }
if (action === “goMap”)      { set({screen:“map”}); }
if (action === “goNewProfile”){ set({screen:“newprofile”,newName:””,newAvatar:AVATARS[0],newErr:””}); }
if (action === “goLeaderboard”){ set({screen:“leaderboard”}); }
if (action === “viewProfile”) { set({screen:“profileview”}); }

if (action === “pickAvatar”) { set({newAvatar: av}); }

if (action === “selectProfile”) {
activeId = id;
set({screen:“map”});
}

if (action === “createProfile”) {
const name = (S.newName || “”).trim();
if (name.length < 2) { set({newErr:“Name needs at least 2 characters”}); return; }
const p = newProfile(name, S.newAvatar);
profiles.push(p);
saveProfiles(profiles);
activeId = p.id;
set({screen:“map”, newName:””, newErr:””});
}

if (action === “deleteProfile”) {
if (!confirm(`Delete profile for ${profile().name}? This cannot be undone.`)) return;
profiles = profiles.filter(p => p.id !== activeId);
saveProfiles(profiles);
activeId = null;
set({screen: profiles.length ? “picker” : “newprofile”});
}

if (action === “selectWorld”) {
set({screen:“difficulty”, worldId:id});
}

if (action === “selectDiff”) {
const puzzles = pickPuzzles(S.worldId, id);
set({screen:“play”, diffId:id, puzzles, idx:0, phase:“play”, answers:[], score:0, hintShown:false, lastOk:null});
}

if (action === “answer”) {
if (S.phase !== “play”) return;
const puzzle = S.puzzles[S.idx];
const correct = idx === puzzle.answer;
// Visual highlight
const btns = document.querySelectorAll(”[data-action=‘answer’]”);
btns.forEach((btn,i) => {
if (i === puzzle.answer) btn.classList.add(“ok”);
else if (i === idx && !correct) btn.classList.add(“bad”);
btn.style.cursor = “default”;
});
setTimeout(() => {
set({phase:“feedback”, lastOk:correct, score: correct?S.score+1:S.score, answers:[…S.answers, correct]});
}, 600);
}

if (action === “showHint”) { set({hintShown:true}); }

if (action === “next”) {
if (S.idx < S.puzzles.length-1) {
set({idx:S.idx+1, phase:“play”, lastOk:null, hintShown:false});
} else {
// Save stats
const p = profile();
const d = diff();
const xpGained = S.score * d.xp;
const newWorlds = {…p.worlds};
newWorlds[S.worldId] = {
games: (newWorlds[S.worldId]?.games||0) + 1,
correct: (newWorlds[S.worldId]?.correct||0) + S.score,
};
updateProfile({
xp: p.xp + xpGained,
gamesPlayed: p.gamesPlayed + 1,
correctTotal: p.correctTotal + S.score,
worlds: newWorlds,
});
set({screen:“result”});
}
}

if (action === “retry”) { set({phase:“play”, lastOk:null}); }

if (action === “playAgain”) {
const puzzles = pickPuzzles(S.worldId, S.diffId);
set({screen:“play”, puzzles, idx:0, phase:“play”, answers:[], score:0, hintShown:false, lastOk:null});
}
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
render();
</script>

</body>
</html>
